spring:
  application:
    name:
      blogging-platform

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:blog-platform-db
    username: sa
    password:

  h2:
    console:
      path: /h2-console
      enabled: true

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

server:
  port: 4001
